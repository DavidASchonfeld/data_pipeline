apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: log-pvc
  namespace: airflow-my-namespace
spec:
  storageClassName: manual  # must match pv-airflow-logs.yaml so K8s binds statically (no provisioner involved)
  accessModes:
   - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi