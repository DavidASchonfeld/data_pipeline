apiVersion: v1
kind: PersistentVolume
metadata:
  name: log-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /opt/airflow/logs
  persistentVolumeReclaimPolicy: Retain  # keeps data on disk if the PVC is deleted
  storageClassName: manual  # "manual" opts out of the local-path provisioner so it never adds nodeAffinity
  claimRef:  # pre-bind to log-pvc so no other PVC can claim this PV
    namespace: airflow-my-namespace
    name: log-pvc
